# Render.com blueprint for Chains TCG.
# Deploys a Node web service that runs the boardgame.io server + REST API
# and serves the built React app, backed by a managed Postgres database.

databases:
  - name: chains-tcg-db
    plan: free                # free Postgres on Render
    databaseName: chains
    user: chains

services:
  - type: web
    name: chains-tcg
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        fromDatabase:
          name: chains-tcg-db
          property: connectionString
      - key: PGSSL
        value: "1"            # Render Postgres requires SSL
      - key: ALLOW_ORIGIN
        sync: false           # set this to your public URL after first deploy, e.g. https://chains-tcg.onrender.com
      - key: HELIUS_API_KEY
        sync: false           # required to populate the Memetic Masters library — paste your Helius API key
      - key: MEMETIC_MASTERS_COLLECTION
        sync: false           # optional: Metaplex collection mint to filter on (recommended); leave unset to filter by name
      - key: MEMETIC_MASTERS_NAME_MATCH
        value: memetic master # fallback substring match when no collection mint is set
      # ---- Custodial $MASTER wager escrow (REQUIRED for wager matches) ----
      - key: CUSTODIAL_ESCROW_KEYPAIR
        sync: false           # JSON byte array of a Solana Keypair secret key, e.g. "[12,34,...]" (64 numbers). Generate with `solana-keygen new -o escrow.json --no-bip39-passphrase` then paste contents of escrow.json. Fund the resulting pubkey with SOL (fees) + a $MASTER ATA.
      - key: SOLANA_RPC
        sync: false           # mainnet RPC URL, e.g. https://mainnet.helius-rpc.com/?api-key=YOUR_KEY (server-side reads for settlement)
      - key: VITE_SOLANA_RPC
        sync: false           # OPTIONAL — client-side RPC. If unset, the build auto-derives one from HELIUS_API_KEY. Public mainnet-beta returns 403 for token-account reads.
      - key: CUSTODIAL_BURN_BPS
        value: "1000"         # 10% rake (burn). Adjust if desired.
      - key: CUSTODIAL_MIN_WAGER_UI
        value: "1"
      - key: CUSTODIAL_MAX_WAGER_UI
        value: "1000000"
